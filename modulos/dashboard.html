<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Bancario - Menu Principal</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-page">
    <header class="app-header">
        <div class="session-block">
            <div>
                <strong id="userName">Usuario</strong>
                <span id="userRole">Rol</span>
            </div>
            <button type="button" id="logoutBtn" class="btn-secondary">Salir</button>
        </div>
    </header>

    <main class="app-main">
        <section class="page-title">
            <h2>Menu principal</h2>
        </section>

        <section id="mainMenu" class="module-grid"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config.js"></script>
    <script src="../app.js"></script>
</body>
</html>
